version: "3"

vars:
  BACKEND_PORT: 3001
  DEV_DB_NAME: chainroll_payrun_preview_frontend
  FRONTEND_PORT: 3000
  POSTGRES_CONTAINER: live-bootcamp-project-db-1
  POSTGRES_USER: postgres

tasks:
  dev:
    desc: Ensure the dev DB exists, then run the API and frontend together
    cmds:
      - task: dev:db
      - task --dir {{.TASKFILE_DIR}} --parallel dev:api dev:frontend

  dev:db:
    desc: Create the local dev database if it does not exist
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        if docker exec {{.POSTGRES_CONTAINER}} psql -U {{.POSTGRES_USER}} -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '{{.DEV_DB_NAME}}'" | grep -q 1; then
          echo "Database {{.DEV_DB_NAME}} already exists"
        else
          docker exec {{.POSTGRES_CONTAINER}} createdb -U {{.POSTGRES_USER}} {{.DEV_DB_NAME}}
          echo "Created database {{.DEV_DB_NAME}}"
        fi

  dev:api:
    desc: Run the API on port {{.BACKEND_PORT}} using the dev database
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        set -a
        . payroll-service/.env
        set +a
        export DATABASE_URL="$(ruby -ruri -e 'u = URI(ENV.fetch("DATABASE_URL")); u.path = "/{{.DEV_DB_NAME}}"; print u.to_s')"
        APP_ADDRESS=127.0.0.1:{{.BACKEND_PORT}} cargo run -p api

  dev:frontend:
    desc: Run the frontend on port {{.FRONTEND_PORT}}
    dir: "{{.TASKFILE_DIR}}/frontend"
    cmds:
      - test -d node_modules || pnpm install
      - pnpm exec next dev --turbopack -p {{.FRONTEND_PORT}}

  build:
    desc: Build all workspace crates
    cmd: cargo build --workspace

  build:release:
    desc: Build all workspace crates in release mode
    cmd: cargo build --workspace --release

  run:
    desc: Run the api binary
    cmd: cargo run --bin api

  run:release:
    desc: Run the api binary in release mode
    cmd: cargo run --bin api --release

  test:
    desc: Run all tests in the workspace
    cmd: cargo test --workspace

  fmt:
    desc: Format all code
    cmd: cargo fmt --all

  fmt:check:
    desc: Check formatting without applying changes
    cmd: cargo fmt --all -- --check

  clippy:
    desc: Run clippy lints
    cmd: cargo clippy --workspace --all-targets --all-features -- -D warnings

  check:
    desc: Check workspace compiles without building
    cmd: cargo check --workspace

  audit:
    desc: Audit dependencies for known vulnerabilities (requires cargo-audit)
    cmd: cargo audit

  deny:
    desc: Check dependencies against policy (requires cargo-deny)
    cmd: cargo deny check

  doc:
    desc: Build documentation
    cmd: cargo doc --workspace --no-deps --open

  clean:
    desc: Remove build artifacts
    cmd: cargo clean

  pre-pr:
    desc: Run all checks required before opening a PR
    deps:
      - fmt:check
      - clippy
      - test
      - audit

  docker:
